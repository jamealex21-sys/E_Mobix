{% extends "base.html" %}
{% load static %}
{% block content %}
<link href="{% static 'css/dashboard.css' %}" rel="stylesheet">

<div class="dashboard-shell">

    <!-- ── Sidebar ──────────────────────────────────────────── -->
    <div id="sidebar">

        <div class="sidebar-brand">
            <button id="sidebarToggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
                <ion-icon name="menu-outline" style="font-size:18px;"></ion-icon>
            </button>
            <div class="brand-icon ms-1">E</div>
            <span class="brand-text ms-1">E_Mobix Admin</span>
        </div>

        <div class="sidebar-nav">
            <a class="nav-item-custom" href="{% url 'dashboard' %}">
                <span class="nav-icon"><ion-icon name="grid-outline"></ion-icon></span>
                <span class="nav-label">Dashboard</span>
            </a>
            <a class="nav-item-custom active" href="{% url 'add_product' %}">
                <span class="nav-icon"><ion-icon name="add-circle-outline"></ion-icon></span>
                <span class="nav-label">Add Product</span>
            </a>
            <a class="nav-item-custom" href="{% url 'dashboard_orders' %}">
                <span class="nav-icon"><ion-icon name="receipt-outline"></ion-icon></span>
                <span class="nav-label">Orders</span>
            </a>
            <a class="nav-item-custom" href="{% url 'dashboard_products' %}">
                <span class="nav-icon"><ion-icon name="phone-portrait-outline"></ion-icon></span>
                <span class="nav-label">Products</span>
            </a>
            <a class="nav-item-custom" href="{% url 'dashboard_customers' %}">
                <span class="nav-icon"><ion-icon name="people-outline"></ion-icon></span>
                <span class="nav-label">Customers</span>
            </a>
            <a class="nav-item-custom" href="{% url 'dashboard_low_stock' %}">
                <span class="nav-icon danger"><ion-icon name="warning-outline"></ion-icon></span>
                <span class="nav-label">Low Stock</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <a class="nav-item-custom" href="{% url 'logout' %}">
                <span class="nav-icon"><ion-icon name="log-out-outline"></ion-icon></span>
                <span class="nav-label">Logout</span>
            </a>
        </div>

    </div>

    <!-- ── Main Content ──────────────────────────────────────── -->
    <div id="main">

        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <p class="page-title">Add Product</p>
                <p class="page-sub">Create a new product listing</p>
            </div>
            <a href="{% url 'dashboard' %}" class="btn-ghost">
                <ion-icon name="arrow-back-outline"></ion-icon>
                Back
            </a>
        </div>

        <div class="form-card" style="max-width:640px;">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label">Product Name</label>
                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        placeholder="e.g. iPhone 15 Pro"
                        required>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label">Price ($)</label>
                        <input
                            type="number"
                            name="price"
                            class="form-control"
                            step="0.01"
                            placeholder="0.00"
                            required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Stock</label>
                        <input
                            type="number"
                            name="stock"
                            class="form-control"
                            placeholder="0">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea
                        name="description"
                        class="form-control"
                        rows="4"
                        placeholder="Product description..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">Product Image</label>
                    <input
                        type="file"
                        name="image"
                        class="form-control"
                        accept="image/*">
                </div>

                <button type="submit" class="btn-primary-custom">
                    <ion-icon name="save-outline"></ion-icon>
                    Save Product
                </button>
            </form>
        </div>

    </div>
</div>

{% endblock %}
